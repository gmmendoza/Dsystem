# ============================================
# Spring Boot - Sistema Docentes
# ============================================

# Server
server.port=8080

# ============================================
# DataSource - PostgreSQL (Koyeb/Environment Variables)
# ============================================
spring.datasource.url=${DATABASE_URL:jdbc:postgresql://localhost:5432/sistema_docentes}
spring.datasource.username=${DB_USER:postgres}
spring.datasource.password=${DB_PASSWORD:postgres}
spring.datasource.driver-class-name=org.postgresql.Driver

# ============================================
# JPA / Hibernate
# ============================================
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# Forzar la ejecución de data.sql
spring.sql.init.mode=always

# ============================================
# JWT
# ============================================
jwt.secret=SistemaDocentesSecretKey2024SuperSeguraYLargaParaHS256Algorithm
jwt.expiration=86400000

# ============================================
# Jackson
# ============================================
spring.jackson.serialization.fail-on-empty-beans=false
